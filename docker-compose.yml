services:
  postgres:
    image: postgres:17-alpine
    container_name: estetica_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-estetica_ns}
      POSTGRES_USER: ${DB_USER:-estetica_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-estetica_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-estetica_user} -d ${DB_NAME:-estetica_ns}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: estetica_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./estetica-backend
      dockerfile: Dockerfile
    container_name: estetica_backend
    restart: unless-stopped
    env_file:
      - ./estetica-backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./estetica-backend/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./estetica-frontend
      dockerfile: Dockerfile
    container_name: estetica_frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
