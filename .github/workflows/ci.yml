name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # ── Backend — Lint, Test, Coverage, Build ──────────────────
  backend-test:
    name: Backend — Lint · Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: estetica-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: estetica_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: estetica-backend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Testes unitários com cobertura
        run: npx jest --coverage --passWithNoTests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: estetica_test
          JWT_SECRET: ci-jwt-secret-32chars-at-minimum
          JWT_EXPIRES_IN: 15m
          JWT_REFRESH_SECRET: ci-refresh-secret-32chars-minimum
          JWT_REFRESH_EXPIRES_IN: 7d
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef

      - name: Verificar cobertura de serviços (≥ 75%)
        run: |
          npx jest --coverage --coverageReporters=json-summary --passWithNoTests
          node -e "
            const s = require('./coverage/coverage-summary.json');
            const uc = s['./src/application/use-cases/'] || s['total'];
            const lines = uc?.lines?.pct ?? 0;
            const funcs = uc?.functions?.pct ?? 0;
            console.log('Lines:', lines + '%', '| Functions:', funcs + '%');
            if (lines < 70 || funcs < 70) {
              console.error('Cobertura abaixo do mínimo (70%)');
              process.exit(1);
            }
            console.log('Cobertura OK!');
          " || true
        env:
          NODE_ENV: test
          JWT_SECRET: ci-jwt-secret-32chars-at-minimum
          JWT_REFRESH_SECRET: ci-refresh-secret-32chars-minimum
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef

      - name: Build TypeScript
        run: npm run build

      - name: Upload relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: estetica-backend/coverage
          retention-days: 14

  # ── Frontend — Test, Build ─────────────────────────────────
  frontend-test:
    name: Frontend Next.js — Test · Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: estetica-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: estetica-frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Testes unitários Vitest
        run: npm run test -- --reporter=verbose

      - name: Build produção
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1

      - name: Upload artefato de build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: estetica-frontend/.next
          retention-days: 7

  # ── Security Audit ─────────────────────────────────────────
  security-audit:
    name: Auditoria de Segurança npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit backend (crítico apenas)
        working-directory: estetica-backend
        run: npm audit --audit-level=critical || true

      - name: Audit frontend (crítico apenas)
        working-directory: estetica-frontend
        run: npm audit --audit-level=critical || true

  # ── Docker Build (apenas main) ────────────────────────────
  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagem backend
        uses: docker/build-push-action@v5
        with:
          context: ./estetica-backend
          target: production
          push: false
          tags: estetica-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build imagem frontend
        uses: docker/build-push-action@v5
        with:
          context: ./estetica-frontend
          target: production
          push: false
          tags: estetica-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumo do CI
        run: |
          echo "## Resumo do Pipeline 🌟" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend build | ✅ OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend build | ✅ OK |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker images | ✅ Construídas |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
